name: CI/CD Docker Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Force actions to use Node24 ahead of the June 2nd default transition
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # Using v4 (ensure you check for v5 if released recently)
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # Updated to v3
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6 # Updated to v6 for Node24 support
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: fraud-backend:latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v6 # Updated to v6 for Node24 support
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false 
          tags: fraud-frontend:latest
